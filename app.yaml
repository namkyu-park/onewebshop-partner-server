# Google App Engine Standard — Python 3.12
# 배포: 프로젝트 루트에서 gcloud app deploy

runtime: python312

entrypoint: uvicorn main:app --host 0.0.0.0 --port $PORT

instance_class: F2

automatic_scaling:
  min_instances: 0
  max_instances: 10
  target_cpu_utilization: 0.65

